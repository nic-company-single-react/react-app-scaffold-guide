  <!-- Host Repository (drawn last as a group so it appears on top) -->
  <g id="host-repository">
    <rect x="310" y="240" width="280" height="125" rx="14" fill="#FFFFFF" stroke="#7C3AED" stroke-width="4"/>
    
    <circle cx="350" cy="268" r="16" fill="#F05032" stroke="#C13921" stroke-width="2"/>
    <path d="M 344 268 L 350 262 L 356 268 L 350 274 Z" fill="#FFFFFF"/>
    
    <text x="375" y="276" font-size="17" font-family="Arial, sans-serif" fill="#5B21B6" font-weight="bold">Host Repository</text>
    
    <rect x="335" y="300" width="230" height="48" rx="8" fill="#F5F3FF" stroke="#7C3AED" stroke-width="2"/>
    <text x="450" y="320" font-size="15" font-family="Arial, sans-serif" fill="#5B21B6" font-weight="bold" text-anchor="middle">Main Application</text>
