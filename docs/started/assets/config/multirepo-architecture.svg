  <path d="M 705 480 Q 705 420 550 365" stroke="#64748B" stroke-width="2.5" fill="none" marker-end="url(#arrowhead)" stroke-dasharray="5 3"/>
  
  <!-- Remote Repository 1 (User Auth) -->
