  <path d="M 705 190 Q 705 215 560 240" stroke="#64748B" stroke-width="2.5" fill="none" marker-end="url(#arrowhead)" stroke-dasharray="5 3"/>
  <path d="M 195 480 Q 195 420 350 365" stroke="#64748B" stroke-width="2.5" fill="none" marker-end="url(#arrowhead)" stroke-dasharray="5 3"/>
