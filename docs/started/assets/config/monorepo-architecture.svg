<svg width="900" height="500" viewBox="0 0 900 500" fill="none" xmlns="http://www.w3.org/2000/svg">
  <rect width="900" height="500" fill="#F8FAFC"/>
  
  <!-- Git Repository Container -->
  <rect x="50" y="30" width="800" height="440" rx="16" fill="#FFFFFF" stroke="#64748B" stroke-width="3" stroke-dasharray="8 4"/>
  
  <!-- Git Icon and Title -->
  <circle cx="90" cy="60" r="18" fill="#F05032" stroke="#C13921" stroke-width="2"/>
  <path d="M 84 60 L 90 54 L 96 60 L 90 66 Z" fill="#FFFFFF"/>
  
  <text x="115" y="68" font-size="18" font-family="Arial, sans-serif" fill="#475569" font-weight="bold">Monorepo - Single Repository</text>
  
  <!-- Shared Dependencies Box -->
  <rect x="80" y="100" width="740" height="80" rx="10" fill="#FEF3C7" stroke="#F59E0B" stroke-width="2"/>
  <text x="450" y="128" font-size="16" font-family="Arial, sans-serif" fill="#92400E" font-weight="bold" text-anchor="middle">Shared Dependencies &amp; Common Packages</text>
  <text x="450" y="150" font-size="12" font-family="Arial, sans-serif" fill="#78716C" text-anchor="middle">eslint config, tsconfig, UI components, utils, types, etc.</text>
  <rect x="320" y="160" width="260" height="12" rx="3" fill="#F59E0B"/>
  
  <!-- Connection lines from shared to packages -->
  <line x1="200" y1="180" x2="200" y2="210" stroke="#F59E0B" stroke-width="2" stroke-dasharray="4 2"/>
  <line x1="350" y1="180" x2="350" y2="210" stroke="#F59E0B" stroke-width="2" stroke-dasharray="4 2"/>
  <line x1="550" y1="180" x2="550" y2="210" stroke="#F59E0B" stroke-width="2" stroke-dasharray="4 2"/>
  <line x1="700" y1="180" x2="700" y2="210" stroke="#F59E0B" stroke-width="2" stroke-dasharray="4 2"/>
  
  <!-- Individual Packages Row 1 -->
  <g id="packages-row1">
    <!-- User Auth Package -->
    <rect x="80" y="210" width="180" height="110" rx="10" fill="#EFF6FF" stroke="#3B82F6" stroke-width="2.5"/>
    <text x="170" y="235" font-size="15" font-family="Arial, sans-serif" fill="#1E40AF" font-weight="bold" text-anchor="middle">User Auth</text>
    <text x="170" y="255" font-size="10" font-family="Arial, sans-serif" fill="#64748B" text-anchor="middle">Package</text>
    <rect x="100" y="265" width="140" height="16" rx="3" fill="#DBEAFE" stroke="#93C5FD" stroke-width="1"/>
    <text x="170" y="276" font-size="9" font-family="Arial, sans-serif" fill="#1E40AF" text-anchor="middle">src/, package.json</text>
    <rect x="110" y="290" width="120" height="18" rx="3" fill="#3B82F6"/>
    <text x="170" y="302" font-size="10" font-family="Arial, sans-serif" fill="#FFFFFF" font-weight="600" text-anchor="middle">Independent Build</text>
    
    <!-- Product Package -->
    <rect x="280" y="210" width="180" height="110" rx="10" fill="#F0FDF4" stroke="#22C55E" stroke-width="2.5"/>
    <text x="370" y="235" font-size="15" font-family="Arial, sans-serif" fill="#15803D" font-weight="bold" text-anchor="middle">Product</text>
    <text x="370" y="255" font-size="10" font-family="Arial, sans-serif" fill="#64748B" text-anchor="middle">Package</text>
    <rect x="300" y="265" width="140" height="16" rx="3" fill="#DCFCE7" stroke="#86EFAC" stroke-width="1"/>
    <text x="370" y="276" font-size="9" font-family="Arial, sans-serif" fill="#15803D" text-anchor="middle">src/, package.json</text>
    <rect x="310" y="290" width="120" height="18" rx="3" fill="#22C55E"/>
    <text x="370" y="302" font-size="10" font-family="Arial, sans-serif" fill="#FFFFFF" font-weight="600" text-anchor="middle">Independent Build</text>
    
    <!-- Order Package -->
    <rect x="480" y="210" width="180" height="110" rx="10" fill="#FEF3C7" stroke="#F59E0B" stroke-width="2.5"/>
    <text x="570" y="235" font-size="15" font-family="Arial, sans-serif" fill="#92400E" font-weight="bold" text-anchor="middle">Order</text>
    <text x="570" y="255" font-size="10" font-family="Arial, sans-serif" fill="#64748B" text-anchor="middle">Package</text>
    <rect x="500" y="265" width="140" height="16" rx="3" fill="#FEF9C3" stroke="#FDE047" stroke-width="1"/>
    <text x="570" y="276" font-size="9" font-family="Arial, sans-serif" fill="#92400E" text-anchor="middle">src/, package.json</text>
    <rect x="510" y="290" width="120" height="18" rx="3" fill="#F59E0B"/>
    <text x="570" y="302" font-size="10" font-family="Arial, sans-serif" fill="#FFFFFF" font-weight="600" text-anchor="middle">Independent Build</text>
    
    <!-- Payment Package -->
    <rect x="680" y="210" width="140" height="110" rx="10" fill="#FDF4FF" stroke="#A855F7" stroke-width="2.5"/>
    <text x="750" y="235" font-size="14" font-family="Arial, sans-serif" fill="#6B21A8" font-weight="bold" text-anchor="middle">Payment</text>
    <text x="750" y="252" font-size="10" font-family="Arial, sans-serif" fill="#64748B" text-anchor="middle">Package</text>
    <rect x="693" y="262" width="114" height="16" rx="3" fill="#FAE8FF" stroke="#E9D5FF" stroke-width="1"/>
    <text x="750" y="273" font-size="9" font-family="Arial, sans-serif" fill="#6B21A8" text-anchor="middle">src/, package.json</text>
    <rect x="700" y="287" width="100" height="18" rx="3" fill="#A855F7"/>
    <text x="750" y="299" font-size="10" font-family="Arial, sans-serif" fill="#FFFFFF" font-weight="600" text-anchor="middle">Independent Build</text>
  </g>
  
  <!-- Individual Packages Row 2 -->
  <g id="packages-row2">
    <!-- Dashboard Package -->
    <rect x="80" y="340" width="180" height="110" rx="10" fill="#FEF2F2" stroke="#EF4444" stroke-width="2.5"/>
    <text x="170" y="365" font-size="15" font-family="Arial, sans-serif" fill="#991B1B" font-weight="bold" text-anchor="middle">Dashboard</text>
    <text x="170" y="385" font-size="10" font-family="Arial, sans-serif" fill="#64748B" text-anchor="middle">Package</text>
    <rect x="100" y="395" width="140" height="16" rx="3" fill="#FEE2E2" stroke="#FECACA" stroke-width="1"/>
    <text x="170" y="406" font-size="9" font-family="Arial, sans-serif" fill="#991B1B" text-anchor="middle">src/, package.json</text>
    <rect x="110" y="420" width="120" height="18" rx="3" fill="#EF4444"/>
    <text x="170" y="432" font-size="10" font-family="Arial, sans-serif" fill="#FFFFFF" font-weight="600" text-anchor="middle">Independent Build</text>
    
    <!-- Report Package -->
    <rect x="280" y="340" width="180" height="110" rx="10" fill="#ECFEFF" stroke="#06B6D4" stroke-width="2.5"/>
    <text x="370" y="365" font-size="15" font-family="Arial, sans-serif" fill="#164E63" font-weight="bold" text-anchor="middle">Report</text>
    <text x="370" y="385" font-size="10" font-family="Arial, sans-serif" fill="#64748B" text-anchor="middle">Package</text>
    <rect x="300" y="395" width="140" height="16" rx="3" fill="#CFFAFE" stroke="#A5F3FC" stroke-width="1"/>
    <text x="370" y="406" font-size="9" font-family="Arial, sans-serif" fill="#164E63" text-anchor="middle">src/, package.json</text>
    <rect x="310" y="420" width="120" height="18" rx="3" fill="#06B6D4"/>
    <text x="370" y="432" font-size="10" font-family="Arial, sans-serif" fill="#FFFFFF" font-weight="600" text-anchor="middle">Independent Build</text>
    
    <!-- Host/Main App Package -->
    <rect x="480" y="340" width="340" height="110" rx="10" fill="#F5F3FF" stroke="#7C3AED" stroke-width="3"/>
    <text x="650" y="365" font-size="16" font-family="Arial, sans-serif" fill="#5B21B6" font-weight="bold" text-anchor="middle">Host / Main Application</text>
    <text x="650" y="385" font-size="10" font-family="Arial, sans-serif" fill="#64748B" text-anchor="middle">Package - Orchestrates all services</text>
    <rect x="520" y="395" width="260" height="16" rx="3" fill="#EDE9FE" stroke="#DDD6FE" stroke-width="1"/>
    <text x="650" y="406" font-size="9" font-family="Arial, sans-serif" fill="#5B21B6" text-anchor="middle">src/, package.json, routing, composition</text>
    <rect x="565" y="420" width="170" height="18" rx="3" fill="#7C3AED"/>
    <text x="650" y="432" font-size="10" font-family="Arial, sans-serif" fill="#FFFFFF" font-weight="600" text-anchor="middle">Unified Build &amp; Deploy</text>
  </g>
</svg>
